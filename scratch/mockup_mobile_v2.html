<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Collaborator App Real - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .tab-active { color: #2563eb; border-bottom: 3px solid #2563eb; font-weight: 900; }
        .chip-active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen bg-white">
    <!-- Real Mobile Header (CollaboratorTasks.tsx style) -->
    <div class="flex items-center gap-3 px-5 py-4 bg-white border-b sticky top-0 z-50">
        <button class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-500">←</button>
        <h2 class="font-black text-gray-900 tracking-tight">Gestão de Tarefas</h2>
    </div>

    <!-- Real Tabs System -->
    <div class="flex justify-around border-b px-2 bg-white sticky top-[65px] z-40">
        <button class="py-4 text-[10px] uppercase font-bold tracking-widest tab-active px-2">Tarefas</button>
        <button class="py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 px-2">Calendário</button>
        <button class="py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 px-2">Concluídas</button>
        <button class="py-4 text-[10px] uppercase font-bold tracking-widest text-gray-400 px-2">Canceladas</button>
    </div>

    <div class="p-5 space-y-8 pb-32">
        
        <!-- Filter Chips (New Addition for Better Org) -->
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
            <button class="px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest chip-active">Todas</button>
            <button class="px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest bg-slate-50 text-slate-400 border border-slate-100">Rotinas (12)</button>
            <button class="px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest bg-slate-50 text-slate-400 border border-slate-100">Extras (3)</button>
        </div>

        <!-- Section: Daily Routines (Grouped by Project) -->
        <section>
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                    <h3 class="text-sm font-black text-gray-900 uppercase tracking-widest">Rotinas Diárias</h3>
                </div>
                <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-lg border border-blue-100">PROJETO: COPA</span>
            </div>

            <div class="space-y-4">
                <!-- Task Card Proposed -->
                <div class="bg-white border-2 border-slate-50 rounded-[2rem] p-5 shadow-sm">
                    <div class="flex items-center gap-4 mb-3">
                        <!-- Quick Check -->
                        <div class="w-12 h-12 rounded-2xl bg-slate-50 border-2 border-slate-100 flex items-center justify-center shrink-0">
                            <div class="w-6 h-6 rounded-md border-2 border-slate-200"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[13px] font-black text-gray-800 leading-tight line-clamp-2">Reposição de Insumos e Limpeza Geral da Copa Matriz</h4>
                            <div class="flex items-center gap-2 mt-1.5">
                                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Copa Matriz</span>
                            </div>
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="space-y-1.5 mb-5 px-1">
                        <div class="flex justify-between text-[9px] font-black text-slate-400 uppercase">
                            <span>Checklist</span>
                            <span>45% Concluído</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-50 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-600 rounded-full" style="width: 45%;"></div>
                        </div>
                    </div>

                    <!-- Action Toolbar -->
                    <div class="flex gap-2 bg-slate-50 p-1.5 rounded-2xl">
                        <button class="flex-1 bg-white shadow-sm border border-slate-100 text-[10px] font-black py-2.5 rounded-xl uppercase tracking-tighter hover:bg-slate-50">
                           📂 Tratar Tarefa
                        </button>
                        <button class="flex-1 bg-white shadow-sm border border-slate-100 text-[10px] font-black py-2.5 rounded-xl uppercase tracking-tighter flex items-center justify-center gap-1">
                           📅 Agenda
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Extra Tasks -->
        <section>
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-6 bg-orange-500 rounded-full"></div>
                    <h3 class="text-sm font-black text-gray-900 uppercase tracking-widest">Tarefas Extras</h3>
                </div>
                <button class="text-[10px] font-black px-3 py-1.5 bg-orange-50 text-orange-600 rounded-xl border border-orange-100">+ NOVA TAREFA</button>
            </div>

            <div class="grid grid-cols-1 gap-4">
                 <div class="bg-orange-50/20 border-2 border-orange-100/50 rounded-[2rem] p-5">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-[9px] font-black px-2 py-0.5 bg-red-500 text-white rounded-md">URGENTE</span>
                        <span class="text-[10px] font-black text-slate-400">PRAZO: 15:00</span>
                    </div>
                    <h4 class="text-sm font-black text-gray-800 mb-4">Enviar relatório de produtividade do setor financeiro</h4>
                    <div class="flex gap-3">
                        <button class="flex-1 bg-orange-500 text-white py-2.5 rounded-xl text-[10px] font-black uppercase">INICIAR AGORA</button>
                        <button class="w-12 h-10 bg-white border border-orange-200 rounded-xl flex items-center justify-center">📅</button>
                    </div>
                 </div>
            </div>
        </section>

    </div>

    <!-- Floating Action Button (WhatsApp Style) -->
    <div class="fixed bottom-8 right-8 w-16 h-16 bg-[#25D366] rounded-full shadow-2xl flex items-center justify-center text-3xl text-white border-4 border-white animate-bounce">
        💬
    </div>
</body>
</html>
